server:
  port: 8080

spring:
  application:
    name: bounce-backend

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:curioussys}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  # JPA — validate only, Flyway owns the schema
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  # Flyway migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Redis for OTP storage + rate limiting
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000

  # Mail (Brevo via SMTP or direct API)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

# JWT configuration
app:
  jwt:
    secret: ${JWT_SECRET:bounce-dev-secret-change-in-production-must-be-64-chars-minimum-ok}
    access-expiration-ms: 900000      # 15 minutes
    refresh-expiration-ms: 604800000  # 7 days
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:3000,http://localhost:5173}


# Brevo API key (for direct API email sending)
brevo:
  api-key: ${BREVO_API_KEY:}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.c4gt: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
