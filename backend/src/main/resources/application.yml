server:
  port: 8080
  shutdown: graceful  # Wait for in-flight requests to complete
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html,text/plain,text/css,application/javascript


spring:
  application:
    name: bounce-backend
  lifecycle:
    timeout-per-shutdown-phase: 30s  # Max wait during shutdown

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:curioussys}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000           # 10 min — close idle connections
      max-lifetime: 1800000          # 30 min — recycle connections
      leak-detection-threshold: 60000  # Log warning if connection not returned in 60s
      connection-test-query: SELECT 1

  # JPA — validate only, Flyway owns the schema
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false  # Prevent lazy loading outside transactions

  # Flyway migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Redis for OTP storage + rate limiting
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000

  # Mail (Brevo via SMTP or direct API)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

# JWT configuration
app:
  jwt:
    secret: ${JWT_SECRET:bounce-dev-secret-change-in-production-must-be-64-chars-minimum-ok}
    access-expiration-ms: 900000      # 15 minutes
    refresh-expiration-ms: 604800000  # 7 days
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:3000,http://localhost:5173}


# Brevo API key (for direct API email sending)
brevo:
  api-key: ${BREVO_API_KEY:}

# Actuator — health checks, metrics, info, prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.c4gt: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
    org.hibernate.SQL: WARN
    org.hibernate.stat: WARN

